name: msvc

on:
  push:
    branches:
      - "develop"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches:
      - "develop"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  build:
    name: ci_windows-latest_msvc
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_ROOT
          if (-not $vcpkgRoot) { $vcpkgRoot = "C:\\vcpkg" }
          $vcpkg = Join-Path $vcpkgRoot "vcpkg.exe"
          if (-not (Test-Path $vcpkg)) { Write-Error "vcpkg not found at $vcpkg"; exit 1 }
          & $vcpkg install sqlite3:x64-windows
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\\scripts\\buildsystems\\vcpkg.cmake `
            -DBUILD_TESTING:BOOL=OFF

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Smoke test
        shell: pwsh
        run: |
          .\build\src\Release\data-generator.exe help | Out-Null
          .\build\src\Release\data-generator.exe run docs\input_example.json --rows 5 --output build\output.csv
