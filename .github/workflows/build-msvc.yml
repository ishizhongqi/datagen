name: msvc

on:
  push:
    branches:
      - "develop"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches:
      - "develop"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

jobs:
  build:
    name: ci_windows-latest_msvc
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Install dependencies
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg.exe install sqlite3:x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DBUILD_TESTING=OFF

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Smoke test
        shell: pwsh
        run: |
          .\build\src\Release\datagen.exe help | Out-Null
          .\build\src\Release\datagen.exe run docs\input_example.json --rows 5 --output build\output.csv
