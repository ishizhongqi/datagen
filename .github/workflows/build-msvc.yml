name: msvc

on:
  push:
    branches:
      - "develop"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  pull_request:
    branches:
      - "develop"
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  build:
    name: ci_windows-latest_msvc
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        shell: pwsh
        run: |
          $vcpkg = \"$env:VCPKG_ROOT\\vcpkg.exe\"
          & $vcpkg install sqlite3:x64-windows

      - name: Configure
        run: |
          cmake -S . -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT\\scripts\\buildsystems\\vcpkg.cmake `
            -DBUILD_TESTING:BOOL=OFF

      - name: Build
        run: |
          cmake --build build --config Release

      - name: Smoke test
        shell: pwsh
        run: |
          .\build\src\Release\data-generator.exe help | Out-Null
          .\build\src\Release\data-generator.exe run docs\input_example.json --rows 5 --output build\output.csv
